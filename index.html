<script>
    let current_page = 1

    function httpGet(url, params = {}, timeout = 5000) {
        // 参数序列化处理
        const query = new URLSearchParams(params).toString();
        const requestUrl = query ? `${url}?${query}` : url;

        return new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', requestUrl, true);
            xhr.timeout = timeout;

            xhr.onload = () => {
                if (xhr.status >= 200 && xhr.status < 300) {
                    resolve({
                        status: xhr.status,
                        data: tryParseJSON(xhr.responseText)
                    });
                } else {
                    reject(new Error(`请求失败，状态码：${xhr.status}`));
                }
            };

            xhr.onerror = () => reject(new Error('网络错误'));
            xhr.ontimeout = () => reject(new Error('请求超时'));

            try {
                xhr.send();
            } catch (e) {
                reject(e);
            }
        });
    }

    function tryParseJSON(text) {
        try {
            return JSON.parse(text);
        } catch {
            return text;
        }
    }

    for (let t of file_types) {
        if (!t.types || t.types.length === 0) {

        const label = document.createElement("label")
        label.innerHTML = `
            <input class="ft-group" name="ft-group" type="radio" onchange="ftGroupChange(this)" value="${t.types.join(',')}"/>${t.name}
        `
        document.getElementById("all-fts").appendChild(label)
    }


    const queryParams = new URLSearchParams(window.location.search);

    //document.getElementById("show-total-msg").innerText = books.length + "本电子书"
    const limit = 20

    let _st = queryParams.get('t')

    let search_types = []
    if (!_st) {
        _st = ""
    }

    search_types = _st.split(",")
    search_types = search_types.filter(item => item !== "");


    let search_keyword = queryParams.get('s')
    if (!search_keyword) {
        search_keyword = ""
    }

    document.getElementById("s").value = search_keyword

    let total_page = Math.ceil(books.length/limit)
    document.getElementById("total-page").innerText = total_page

    function formatBytes(bytes) {
        if (isNaN(bytes) || bytes < 0) return '无效输入';
        if (bytes === 0) return '0 Bytes';

        const units = ['Bytes', 'KB', 'MB', 'GB', 'TB', 'PB', 'EB', 'ZB', 'YB'];
        let index = 0;

        // 循环除以 1024，直到字节数小于 1024 或到达最大单位
        while (bytes >= 1024 && index < units.length - 1) {
            bytes /= 1024;
            index++;
        }

        // 格式化数值：移除末尾的 .0 和多余的小数位
        const formattedValue = parseFloat(bytes.toFixed(2)).toString();
        return `${formattedValue} ${units[index]}`;
    }

    function renderPage(page, books) {
        const start = (page - 1) * limit
        const end = page * limit
        const booksToShow = books.slice(start, end)
        const cc = document.getElementById("cc")
        cc.innerHTML = `
<div class="c"><div class="l"><c class="t">名称</c></div>
    <div class="r">
        <span class="size">类型</span>
        <span class="size fs">大小</span>
        <span class="size">ISBN</span>
        <span class="size">密码</span>
        <a>下载</a></div></div>`
        for (let book of booksToShow) {
            const div = document.createElement("div")
            div.className = "c"

            let name = book.n
            if (search_keyword !== "") {
                name = name.replace(search_keyword, `<span style="color: red;">${search_keyword}</span>`)
            }

            let download_url = `https://voluble-croquembouche-d321dc.netlify.app/?s=` + encodeURIComponent(book.n) //+ "&t=" + encodeURIComponent(book.n)
            div.innerHTML = `
                <div class="l"><c class="t">${name}</c></div>
                <div class="r">
                <span class="size">${extensions[book.i]}</span>
                <span class="size fs">${formatBytes(book.s)}</span>
                <span class="size">${book.b}</span>
                <span class="size">${passwords[book.p]}</span>
                <a href="${download_url}" target="_blank">下载</a></div>
            `
            cc.appendChild(div)
        }
    }

    function searchPage(current_page){
        let target = []
        for (let book of books) {
            if (search_types.length > 0 && !search_types.includes(book.i)) {
                continue
            }

            if (search_keyword !== '' && book.n.indexOf(search_keyword) === -1  && book.b.indexOf(search_keyword) === -1) {
                continue
            }

            target.push(book)
        }

        let total_page = Math.ceil(target.length/limit)
        if (current_page > total_page) {
            current_page = 1
        }

        if (current_page < 1) {
            current_page = total_page
        }

        document.getElementById("current-page").innerText = current_page
        document.getElementById("total-page").innerText = total_page
        renderPage(current_page, target)
    }

    searchPage(current_page)

     function ftGroupChange(e) {
        const value = e.value

        search_types = value.split(",")
        search_types = search_types.filter(item => item !== "");

        current_page = 1
        searchPage(current_page)
    }

    document.getElementById("next-page").addEventListener("click", function () {
        current_page++
        searchPage(current_page)
    })

    document.getElementById("prev-page").addEventListener("click", function () {
        current_page--
        searchPage(current_page)
    })

    document.getElementById("s").addEventListener("change", function (e) {
        search_keyword = this.value.trim()
        current_page = 1
        searchPage(current_page)
    });
</script>
